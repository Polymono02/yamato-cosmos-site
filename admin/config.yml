backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "content"
    label: "サイト内容"
    files:
      - name: "site"
        label: "サイト全体・トップページ"
        file: "content.json"
        fields:
          - label: "サイト全体"
            name: "site"
            widget: "object"
            fields:
              - { label: "電話番号", name: "tel", widget: "string" }
          - label: "ロゴ"
            name: "logo"
            widget: "object"
            fields:
              - { label: "ロゴ画像", name: "src", widget: "image" }
          - label: "トップページ"
            name: "index"
            widget: "object"
            fields:
              - { label: "ヒーロー タグ文言", name: "heroTag", widget: "string" }
              - { label: "ヒーロー 見出し", name: "heroTitle", widget: "string" }
              - { label: "ヒーロー 説明文", name: "heroDesc", widget: "text" }
              - { label: "ようこそ 見出し", name: "welcomeTitle", widget: "string" }
              - { label: "ようこそ 本文", name: "welcomeBody", widget: "text" }
              - { label: "カード1 タイトル", name: "card1Title", widget: "string" }
              - { label: "カード1 本文", name: "card1Body", widget: "text" }
              - { label: "カード2 タイトル", name: "card2Title", widget: "string" }
              - { label: "カード2 本文", name: "card2Body", widget: "text" }
          - label: "会社概要"
            name: "company"
            widget: "object"
            fields:
              - { label: "会社名", name: "name", widget: "string" }
              - { label: "事業内容", name: "business", widget: "string" }
              - { label: "所在地", name: "address", widget: "string" }
              - { label: "電話番号", name: "tel", widget: "string" }
              - { label: "FAX番号", name: "fax", widget: "string" }
              - { label: "営業時間", name: "hours", widget: "string" }
              - { label: "設立", name: "founded", widget: "string" }
          - label: "事業内容ページ"
            name: "business"
            widget: "object"
            fields:
              - { label: "セクション1 見出し", name: "section1Title", widget: "string" }
              - { label: "セクション1 本文", name: "section1Body", widget: "text" }
              - { label: "セクション2 見出し", name: "section2Title", widget: "string" }
              - { label: "セクション2 本文", name: "section2Body", widget: "text" }
          - label: "お問い合わせページ"
            name: "contact"
            widget: "object"
            fields:
              - { label: "電話番号", name: "tel", widget: "string" }
              - { label: "FAX", name: "fax", widget: "string" }
              - { label: "メール", name: "email", widget: "string" }
          - label: "トップページ写真スライドショー"
            name: "slideshow"
            widget: "list"
            field: { label: "写真", name: "image", widget: "image" }
